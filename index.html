<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SIAP JALAN - Backup & Monitoring</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D2F5F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://i.ibb.co.com/XZTqS2bX/LOGO-SJ.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* ============================================================
       ALL CSS
    ============================================================ */
    :root {
      --navy: #0D2F5F;
      --navy-light: #1a4a7a;
      --navy-dark: #061a30;
      --gold: #F5B400;
      --gold-light: #ffc933;
      --gold-dark: #d49a00;
      --white: #ffffff;
      --gray-50: #f8f9fa;
      --gray-100: #f0f2f5;
      --gray-200: #e0e0e0;
      --gray-300: #c0c0c0;
      --gray-600: #6c757d;
      --gray-800: #333333;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #ffc107;
      --info: #17a2b8;
      --shadow: 0 2px 12px rgba(13,47,95,0.15);
      --shadow-hover: 0 4px 20px rgba(13,47,95,0.25);
      --radius: 12px;
      --transition: all 0.3s ease;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--gray-800);
      min-height: 100vh;
      background: var(--gray-50);
      overflow: hidden;
    }
    
    /* ============================================================
       SPLASH SCREEN ANIMATION
    ============================================================ */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0D2F5F 0%, #0a2345 50%, #061a30 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: splashFadeOut 3.5s ease-in-out forwards;
      animation-delay: 2.5s;
    }
    
    @keyframes splashFadeOut {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    
    .splash-content {
      text-align: center;
      animation: splashPulse 2s ease-in-out infinite;
    }
    
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .splash-logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--white);
      padding: 15px;
      margin: 0 auto 25px;
      box-shadow: 0 0 60px rgba(245, 180, 0, 0.3);
      animation: logoGlow 2s ease-in-out infinite;
    }
    
    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 60px rgba(245, 180, 0, 0.3); }
      50% { box-shadow: 0 0 100px rgba(245, 180, 0, 0.6); }
    }
    
    .splash-logo img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .splash-title {
      color: var(--white);
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 2px;
    }
    
    .splash-title .siap {
      color: var(--gold);
    }
    
    .splash-title .jalan {
      color: var(--white);
    }
    
    .splash-subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    
    .splash-loader {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    
    .splash-loader .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotBounce 1.4s ease-in-out infinite both;
    }
    
    .splash-loader .dot:nth-child(1) { animation-delay: -0.32s; }
    .splash-loader .dot:nth-child(2) { animation-delay: -0.16s; }
    .splash-loader .dot:nth-child(3) { animation-delay: 0s; }
    
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    .splash-version {
      position: absolute;
      bottom: 30px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 2px;
    }
    
    /* ============================================================
       HIDE SPLASH
    ============================================================ */
    #splashScreen.hidden {
      display: none;
    }
    
    /* ============================================================
       MAIN APP - IFRAME WRAPPER
    ============================================================ */
    #mainApp {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    
    #mainApp.visible {
      display: flex;
      flex-direction: column;
      opacity: 1;
    }
    
    /* ============================================================
       APP HEADER
    ============================================================ */
    .app-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      color: var(--white);
      padding: 8px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      z-index: 100;
      min-height: 56px;
    }
    
    .app-header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .app-header .logo img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      background: var(--white);
      padding: 2px;
    }
    
    .app-header .logo h1 {
      font-size: 18px;
      font-weight: 700;
    }
    
    .app-header .logo h1 .siap {
      color: var(--gold);
    }
    
    .app-header .logo h1 .jalan {
      color: var(--white);
    }
    
    .app-header .logo .subtitle {
      font-size: 8px;
      font-weight: 300;
      opacity: 0.8;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    /* User Info + Timer Gabung */
    .user-timer-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      padding: 4px 14px 4px 18px;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    
    .user-timer-group .user-icon {
      font-size: 16px;
      color: var(--gold);
      margin-right: 2px;
    }
    
    .user-timer-group .user-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--white);
    }
    
    .user-timer-group .divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.2);
      margin: 0 4px;
    }
    
    #sessionTimer {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      font-variant-numeric: tabular-nums;
    }
    
    #sessionTimer i {
      font-size: 11px;
      opacity: 0.7;
    }
    
    #sessionTimer.warning {
      color: var(--gold);
      animation: blink 1s ease-in-out infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    /* Status dot */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 4px;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    
    .status-dot.warning {
      background: var(--gold);
    }
    
    .btn-logout {
      background: rgba(255,255,255,0.15);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 5px 14px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 12px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-logout:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }
    
    /* ============================================================
       IFRAME - FULLSCREEN
    ============================================================ */
    #appIframe {
      flex: 1;
      width: 100%;
      border: none;
      background: var(--gray-50);
    }
    
    /* ============================================================
       TOMBOL INSTALL DI BAWAH LOGIN
    ============================================================ */
    #installOverlay {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      display: none;
      animation: slideUp 0.5s ease;
    }
    
    #installOverlay.show {
      display: block;
    }
    
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    .btn-install-bottom {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: var(--navy);
      border: none;
      padding: 14px 32px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(245, 180, 0, 0.4);
      font-family: 'Inter', sans-serif;
    }
    
    .btn-install-bottom:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 30px rgba(245, 180, 0, 0.6);
    }
    
    .btn-install-bottom:active {
      transform: scale(0.95);
    }
    
    .btn-install-bottom i {
      font-size: 22px;
    }
    
    .btn-install-bottom .install-badge {
      background: rgba(13, 47, 95, 0.15);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    
    /* ============================================================
       IOS INSTALL PROMPT
    ============================================================ */
    .ios-install-prompt {
      display: none;
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--navy);
      color: white;
      padding: 15px 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-hover);
      z-index: 1000;
      max-width: 90%;
      text-align: center;
      font-size: 14px;
      animation: slideUp 0.5s ease;
    }
    
    .ios-install-prompt .close-prompt {
      position: absolute;
      top: 5px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 20px;
      cursor: pointer;
    }
    
    .ios-install-prompt .share-icon {
      font-size: 30px;
      display: block;
      margin: 5px 0;
    }
    
    /* ============================================================
       LOADING OVERLAY
    ============================================================ */
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      flex-direction: column;
      gap: 20px;
    }
    
    #loadingOverlay.active {
      display: flex;
    }
    
    #loadingOverlay .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--gray-200);
      border-top: 4px solid var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    #loadingOverlay p {
      color: var(--gray-600);
      font-weight: 500;
    }
    
    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 768px) {
      .app-header { padding: 6px 12px; min-height: 48px; }
      .app-header .logo h1 { font-size: 15px; }
      .app-header .logo img { width: 30px; height: 30px; }
      .app-header .logo .subtitle { display: none; }
      
      .user-timer-group { 
        padding: 3px 10px 3px 14px; 
        gap: 4px;
      }
      .user-timer-group .user-name { font-size: 11px; }
      .user-timer-group .divider { margin: 0 2px; }
      #sessionTimer { font-size: 10px; }
      #sessionTimer i { display: none; }
      
      .btn-logout { font-size: 10px; padding: 4px 10px; }
      .btn-logout span { display: none; }
      
      .btn-install-bottom { padding: 12px 24px; font-size: 14px; }
      .btn-install-bottom i { font-size: 18px; }
      .splash-title { font-size: 28px; }
      .splash-logo { width: 100px; height: 100px; }
      #installOverlay { bottom: 15px; width: 92%; }
      .btn-install-bottom { width: 100%; justify-content: center; }
    }
    
    @media (max-width: 480px) {
      .splash-title { font-size: 24px; }
      .splash-logo { width: 80px; height: 80px; }
      .splash-subtitle { font-size: 11px; letter-spacing: 2px; }
      .btn-install-bottom { padding: 10px 18px; font-size: 13px; }
      .btn-install-bottom .install-badge { display: none; }
      
      .user-timer-group .user-name { font-size: 10px; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #sessionTimer { font-size: 9px; }
    }
  </style>
</head>
<body>
  
  <!-- ============================================================
       SPLASH SCREEN
  ============================================================ -->
  <div id="splashScreen">
    <div class="splash-content">
      <div class="splash-logo">
        <img src="https://i.ibb.co.com/XZTqS2bX/LOGO-SJ.png" alt="SIAP JALAN">
      </div>
      <h1 class="splash-title">
        <span class="siap">SIAP</span> 
        <span class="jalan">JALAN</span>
      </h1>
      <p class="splash-subtitle">Backup &amp; Monitoring System</p>
      <div class="splash-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="splash-version">v2.0 • BINAMARGA</div>
    </div>
  </div>
  
  <!-- ============================================================
       LOADING OVERLAY
  ============================================================ -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p>Memuat aplikasi...</p>
  </div>
  
  <!-- ============================================================
       TOMBOL INSTALL DI BAWAH LAYAR
  ============================================================ -->
  <div id="installOverlay">
    <button class="btn-install-bottom" onclick="installApp()">
      <i class="fas fa-download"></i>
      <span>Instal SiapJalan</span>
      <span class="install-badge"><i class="fas fa-mobile-alt"></i> PWA</span>
    </button>
  </div>
  
  <!-- ============================================================
       IOS INSTALL PROMPT
  ============================================================ -->
  <div class="ios-install-prompt" id="iosPrompt">
    <button class="close-prompt" onclick="document.getElementById('iosPrompt').style.display='none'">&times;</button>
    <span class="share-icon">📱</span>
    <p><strong>Instal SIAP JALAN</strong><br>
    Tap <i class="fas fa-square-arrow-up" style="color:var(--gold);"></i> Share lalu pilih <strong>"Add to Home Screen"</strong></p>
  </div>
  
  <!-- ============================================================
       MAIN APP
  ============================================================ -->
  <div id="mainApp">
    <header class="app-header">
      <div class="logo">
        <img src="https://i.ibb.co.com/XZTqS2bX/LOGO-SJ.png" alt="SIAP JALAN">
        <div>
          <h1>
            <span class="siap">SIAP</span> 
            <span class="jalan">JALAN</span>
          </h1>
          <div class="subtitle">Backup &amp; Monitoring System</div>
        </div>
      </div>
      <div class="header-actions">
        <!-- User + Timer Gabung dalam 1 group -->
        <div class="user-timer-group" id="userTimerGroup">
          <span class="user-icon"><i class="fas fa-user-circle"></i></span>
          <span class="user-name" id="userNameDisplay">Guest</span>
          <span class="divider"></span>
          <span id="sessionTimer">
            <i class="fas fa-clock"></i> 
            <span id="timerText">30:00</span>
          </span>
          <span class="status-dot" id="statusDot"></span>
        </div>
        
        <button class="btn-logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </div>
    </header>
    
    <!-- IFRAME untuk web app -->
    <iframe id="appIframe" 
            src="https://script.google.com/macros/s/AKfycbw8Ltc68JaLuUSNzJz6L5weD1_QjH8ybd5_DQCn1zW6DDf7MoUQuKpL6qsEBHn0rL4lZQ/exec"
            allow="geolocation; microphone; camera; midi; encrypted-media"
            allowfullscreen>
    </iframe>
  </div>
  
  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
    // ============================================================
    // AUTO LOGOUT - 30 MINUTES INACTIVITY
    // ============================================================
    const SESSION_TIMEOUT = 30 * 60 * 1000;
    let sessionTimer = null;
    let timeLeft = SESSION_TIMEOUT;
    let timerInterval = null;
    let isWarningShown = false;
    let isLoggedIn = false;
    
    // Reset timer
    function resetSessionTimer() {
      timeLeft = SESSION_TIMEOUT;
      isWarningShown = false;
      updateTimerDisplay();
      clearTimeout(sessionTimer);
      sessionTimer = setTimeout(handleSessionTimeout, SESSION_TIMEOUT);
    }
    
    // Update display timer
    function updateTimerDisplay() {
      const minutes = Math.floor(timeLeft / 60000);
      const seconds = Math.floor((timeLeft % 60000) / 1000);
      const timerText = document.getElementById('timerText');
      timerText.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      
      const sessionTimerEl = document.getElementById('sessionTimer');
      const statusDot = document.getElementById('statusDot');
      
      if (timeLeft < 5 * 60 * 1000) {
        sessionTimerEl.classList.add('warning');
        statusDot.classList.add('warning');
        if (!isWarningShown) {
          isWarningShown = true;
          showToast('⚠️ Sesi akan berakhir dalam 5 menit! Lakukan aktivitas untuk tetap login.', 'warning');
        }
      } else {
        sessionTimerEl.classList.remove('warning');
        statusDot.classList.remove('warning');
      }
    }
    
    function handleSessionTimeout() {
      showToast('⏰ Sesi berakhir karena tidak ada aktivitas selama 30 menit. Silakan login kembali.', 'error');
      logout();
    }
    
    function resetInactivityTimer() {
      if (isLoggedIn) {
        resetSessionTimer();
      }
    }
    
    // Event listener untuk aktivitas user
    const events = ['click', 'mousemove', 'keydown', 'scroll', 'touchstart', 'touchmove', 'pointerdown', 'pointermove'];
    events.forEach(event => {
      document.addEventListener(event, resetInactivityTimer, true);
    });
    
    function startTimerInterval() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft -= 1000;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          handleSessionTimeout();
        } else {
          updateTimerDisplay();
        }
      }, 1000);
    }
    
    // ============================================================
    // IFRAME LOADING HANDLER
    // ============================================================
    function handleIframeLoad() {
      const overlay = document.getElementById('loadingOverlay');
      overlay.classList.remove('active');
      
      try {
        const iframe = document.getElementById('appIframe');
        const iframeUrl = iframe.contentWindow.location.href;
        
        if (iframeUrl.includes('exec') && !iframeUrl.includes('login')) {
          isLoggedIn = true;
          resetSessionTimer();
          startTimerInterval();
          document.getElementById('installOverlay').classList.remove('show');
          // Update user name jika bisa
          updateUserName('User');
        } else {
          document.getElementById('installOverlay').classList.add('show');
          updateUserName('Guest');
        }
      } catch(e) {
        isLoggedIn = true;
        resetSessionTimer();
        startTimerInterval();
        document.getElementById('installOverlay').classList.remove('show');
      }
    }
    
    // ============================================================
    // UPDATE USER NAME
    // ============================================================
    function updateUserName(name) {
      const userNameEl = document.getElementById('userNameDisplay');
      if (name && name !== 'Guest') {
        userNameEl.textContent = name;
      } else {
        userNameEl.textContent = 'Guest';
      }
    }
    
    // ============================================================
    // DETECT LOGIN STATE
    // ============================================================
    let loginCheckInterval = null;
    
    function checkLoginState() {
      try {
        const iframe = document.getElementById('appIframe');
        const iframeUrl = iframe.contentWindow.location.href;
        
        if (iframeUrl.includes('login') || iframeUrl.includes('Login')) {
          document.getElementById('installOverlay').classList.add('show');
          isLoggedIn = false;
          updateUserName('Guest');
        } else if (iframeUrl.includes('exec') && !iframeUrl.includes('login')) {
          document.getElementById('installOverlay').classList.remove('show');
          if (!isLoggedIn) {
            isLoggedIn = true;
            resetSessionTimer();
            startTimerInterval();
            updateUserName('User');
          }
        }
      } catch(e) {
        // Cross-origin - biarkan
      }
    }
    
    // ============================================================
    // PWA - INSTALLATION
    // ============================================================
    let deferredPrompt = null;
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) {
            console.log('✅ Service Worker registered:', reg.scope);
          })
          .catch(function(err) {
            console.log('❌ Service Worker registration failed:', err);
          });
      });
    }
    
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installOverlay').classList.add('show');
      console.log('📲 Install prompt available');
    });
    
    window.addEventListener('appinstalled', function() {
      document.getElementById('installOverlay').classList.remove('show');
      console.log('✅ App installed successfully');
      showToast('✅ Aplikasi berhasil diinstal!', 'success');
    });
    
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(choiceResult) {
          if (choiceResult.outcome === 'accepted') {
            console.log('✅ User accepted the install prompt');
            document.getElementById('installOverlay').classList.remove('show');
          } else {
            console.log('❌ User dismissed the install prompt');
          }
          deferredPrompt = null;
        });
      } else {
        if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) {
          document.getElementById('iosPrompt').style.display = 'block';
        } else {
          showToast('💡 Gunakan Chrome atau Edge untuk instalasi', 'info');
        }
      }
    }
    
    // ============================================================
    // HIDE SPLASH & LOAD APP
    // ============================================================
    window.addEventListener('load', function() {
      document.getElementById('loadingOverlay').classList.add('active');
      
      setTimeout(function() {
        document.getElementById('splashScreen').classList.add('hidden');
        
        const mainApp = document.getElementById('mainApp');
        mainApp.style.display = 'flex';
        setTimeout(function() {
          mainApp.classList.add('visible');
        }, 100);
        
        const iframe = document.getElementById('appIframe');
        iframe.addEventListener('load', handleIframeLoad);
        
        loginCheckInterval = setInterval(checkLoginState, 3000);
        
        setTimeout(function() {
          const overlay = document.getElementById('loadingOverlay');
          if (overlay.classList.contains('active')) {
            overlay.classList.remove('active');
            document.getElementById('installOverlay').classList.add('show');
          }
        }, 15000);
        
        if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
          handleIframeLoad();
        }
        
      }, 3000);
    });
    
    // ============================================================
    // TOAST
    // ============================================================
    function showToast(message, type) {
      const toast = document.createElement('div');
      const colors = {
        success: '#28a745',
        error: '#dc3545',
        warning: '#ffc107',
        info: '#17a2b8'
      };
      
      const isInstallVisible = document.getElementById('installOverlay').classList.contains('show');
      
      toast.style.cssText = `
        position: fixed;
        bottom: ${isInstallVisible ? '100px' : '30px'};
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 28px;
        border-radius: 12px;
        color: ${type === 'warning' ? '#333' : 'white'};
        font-weight: 600;
        z-index: 9999;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        animation: slideUp 0.5s ease;
        max-width: 90%;
        background: ${colors[type] || colors.info};
        font-family: 'Inter', sans-serif;
        text-align: center;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.5s ease';
        setTimeout(function() { toast.remove(); }, 500);
      }, 5000);
    }
    
    // ============================================================
    // LOGOUT
    // ============================================================
    function logout() {
      if (timerInterval) clearInterval(timerInterval);
      if (sessionTimer) clearTimeout(sessionTimer);
      if (loginCheckInterval) clearInterval(loginCheckInterval);
      
      isLoggedIn = false;
      
      const iframe = document.getElementById('appIframe');
      iframe.src = 'https://script.google.com/macros/s/AKfycbw8Ltc68JaLuUSNzJz6L5weD1_QjH8ybd5_DQCn1zW6DDf7MoUQuKpL6qsEBHn0rL4lZQ/exec';
      
      timeLeft = SESSION_TIMEOUT;
      updateTimerDisplay();
      updateUserName('Guest');
      
      setTimeout(() => {
        document.getElementById('installOverlay').classList.add('show');
      }, 1000);
      
      showToast('👋 Anda telah logout', 'info');
    }
    
    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.shiftKey && (e.key === 'L' || e.key === 'l')) {
        e.preventDefault();
        if (confirm('Yakin ingin logout?')) {
          logout();
        }
      }
    });
    
    console.log('🚀 SIAP JALAN PWA v2.0 loaded!');
    console.log('⏱️ Auto logout: 30 menit tidak ada aktivitas');
    console.log('⌨️ Shortcut: Ctrl+Shift+L untuk logout');
    console.log('📱 Klik "Instal SiapJalan" di bawah untuk install PWA');
  </script>
</body>
</html>
