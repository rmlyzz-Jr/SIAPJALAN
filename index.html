<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SIAP JALAN - Backup & Monitoring</title>
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0D2F5F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://i.ibb.co.com/XZTqS2bX/LOGO-SJ.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* ============================================================
       CSS VARIABLES & RESET
    ============================================================ */
    :root {
      --navy: #0D2F5F;
      --navy-light: #1a4a7a;
      --navy-dark: #061a30;
      --gold: #F5B400;
      --gold-light: #ffc933;
      --gold-dark: #d49a00;
      --white: #ffffff;
      --gray-50: #f8f9fa;
      --gray-100: #f0f2f5;
      --gray-200: #e0e0e0;
      --gray-300: #c0c0c0;
      --gray-600: #6c757d;
      --gray-800: #333333;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #ffc107;
      --info: #17a2b8;
      --shadow: 0 2px 12px rgba(13,47,95,0.15);
      --shadow-hover: 0 4px 20px rgba(13,47,95,0.25);
      --radius: 12px;
      --transition: all 0.3s ease;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--gray-800);
      min-height: 100vh;
      background: var(--gray-50);
      overflow: hidden;
    }
    
    /* ============================================================
       SPLASH SCREEN ANIMATION
    ============================================================ */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0D2F5F 0%, #0a2345 50%, #061a30 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: splashFadeOut 3s ease-in-out forwards;
      animation-delay: 2.5s;
    }
    
    @keyframes splashFadeOut {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    
    .splash-content {
      text-align: center;
      animation: splashPulse 2s ease-in-out infinite;
    }
    
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .splash-logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--white);
      padding: 15px;
      margin: 0 auto 25px;
      box-shadow: 0 0 60px rgba(245, 180, 0, 0.3);
      animation: logoGlow 2s ease-in-out infinite;
    }
    
    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 60px rgba(245, 180, 0, 0.3); }
      50% { box-shadow: 0 0 100px rgba(245, 180, 0, 0.6); }
    }
    
    .splash-logo img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .splash-title {
      color: var(--white);
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 2px;
    }
    
    .splash-title .siap {
      color: var(--gold);
    }
    
    .splash-title .jalan {
      color: var(--white);
    }
    
    .splash-subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    
    .splash-loader {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    
    .splash-loader .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      animation: dotBounce 1.4s ease-in-out infinite both;
    }
    
    .splash-loader .dot:nth-child(1) { animation-delay: -0.32s; }
    .splash-loader .dot:nth-child(2) { animation-delay: -0.16s; }
    .splash-loader .dot:nth-child(3) { animation-delay: 0s; }
    
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    .splash-version {
      position: absolute;
      bottom: 30px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      letter-spacing: 2px;
    }
    
    /* ============================================================
       HIDE SPLASH AFTER ANIMATION
    ============================================================ */
    #splashScreen.hidden {
      display: none;
    }
    
    /* ============================================================
       MAIN APP (display: none initially)
    ============================================================ */
    #mainApp {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    #mainApp.visible {
      display: block;
      opacity: 1;
    }
    
    /* ============================================================
       REST OF CSS - (SAME AS YOUR ORIGINAL, abbreviated)
    ============================================================ */
    /* ... (sertakan semua CSS dari Index.html Anda di sini) ... */
    
    /* Untuk keperluan demo, saya sertakan CSS minimal */
    .app-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      color: var(--white);
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .app-header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .app-header .logo img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      background: var(--white);
      padding: 3px;
    }
    
    .app-header .logo h1 {
      font-size: 22px;
      font-weight: 700;
    }
    
    .app-header .logo h1 .siap {
      color: var(--gold);
    }
    
    .app-header .logo h1 .jalan {
      color: var(--white);
    }
    
    .app-header .logo .subtitle {
      font-size: 10px;
      font-weight: 300;
      opacity: 0.8;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255,255,255,0.1);
      padding: 8px 18px;
      border-radius: 25px;
      flex-wrap: wrap;
    }
    
    .btn-logout {
      background: rgba(255,255,255,0.2);
      color: var(--white);
      border: none;
      padding: 6px 16px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 13px;
      transition: var(--transition);
    }
    
    .btn-logout:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
    
    .content {
      padding: 25px 30px;
      max-width: 1400px;
      margin: 0 auto;
      min-height: calc(100vh - 120px);
    }
    
    /* Install Button */
    #installBtn {
      display: none;
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 6px 16px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: var(--transition);
    }
    
    #installBtn:hover {
      transform: scale(1.05);
      background: var(--gold-light);
    }
    
    @media (max-width: 768px) {
      .app-header { padding: 12px 15px; }
      .app-header .logo h1 { font-size: 18px; }
      .splash-title { font-size: 28px; }
      .splash-logo { width: 100px; height: 100px; }
      .content { padding: 15px; }
    }
    
    /* Install prompt untuk iOS */
    .ios-install-prompt {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--navy);
      color: white;
      padding: 15px 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-hover);
      z-index: 999;
      max-width: 90%;
      text-align: center;
      font-size: 14px;
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    .ios-install-prompt .close-prompt {
      position: absolute;
      top: 5px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 20px;
      cursor: pointer;
    }
    
    .ios-install-prompt .share-icon {
      font-size: 30px;
      display: block;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  
  <!-- ============================================================
       SPLASH SCREEN
  ============================================================ -->
  <div id="splashScreen">
    <div class="splash-content">
      <div class="splash-logo">
        <img src="https://i.ibb.co.com/XZTqS2bX/LOGO-SJ.png" alt="SIAP JALAN">
      </div>
      <h1 class="splash-title">
        <span class="siap">SIAP</span> 
        <span class="jalan">JALAN</span>
      </h1>
      <p class="splash-subtitle">Backup &amp; Monitoring System</p>
      <div class="splash-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="splash-version">v2.0 • BINAMARGA</div>
    </div>
  </div>
  
  <!-- ============================================================
       INSTALL PROMPT iOS
  ============================================================ -->
  <div class="ios-install-prompt" id="iosPrompt">
    <button class="close-prompt" onclick="document.getElementById('iosPrompt').style.display='none'">&times;</button>
    <span class="share-icon">📱</span>
    <p><strong>Instal SIAP JALAN</strong><br>
    Tap <i class="fas fa-square-arrow-up" style="color:var(--gold);"></i> Share lalu pilih <strong>"Add to Home Screen"</strong></p>
  </div>
  
  <!-- ============================================================
       MAIN APP
  ============================================================ -->
  <div id="mainApp">
    <header class="app-header">
      <div class="logo">
        <img src="https://i.ibb.co.com/XZTqS2bX/LOGO-SJ.png" alt="SIAP JALAN">
        <div>
          <h1>
            <span class="siap">SIAP</span> 
            <span class="jalan">JALAN</span>
          </h1>
          <div class="subtitle">Backup &amp; Monitoring System</div>
        </div>
      </div>
      <div class="user-info">
        <span id="userDisplay">Loading...</span>
        <button id="installBtn" onclick="installApp()">
          <i class="fas fa-download"></i> Install
        </button>
        <button class="btn-logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </header>
    
    <div class="content">
      <div style="text-align:center;padding:60px 20px;background:rgba(255,255,255,0.9);border-radius:var(--radius);box-shadow:var(--shadow);">
        <i class="fas fa-sync fa-spin" style="font-size:48px;color:var(--gold);margin-bottom:20px;"></i>
        <h2 style="color:var(--navy);margin-bottom:10px;">Memuat Aplikasi...</h2>
        <p style="color:var(--gray-600);">Silakan tunggu sebentar</p>
        <div style="margin-top:20px;display:flex;justify-content:center;gap:8px;">
          <span class="dot" style="width:12px;height:12px;border-radius:50%;background:var(--gold);animation:dotBounce 1.4s ease-in-out infinite both;"></span>
          <span class="dot" style="width:12px;height:12px;border-radius:50%;background:var(--gold);animation:dotBounce 1.4s ease-in-out infinite both;animation-delay:-0.16s;"></span>
          <span class="dot" style="width:12px;height:12px;border-radius:50%;background:var(--gold);animation:dotBounce 1.4s ease-in-out infinite both;animation-delay:0s;"></span>
        </div>
      </div>
    </div>
  </div>
  
  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
    // ============================================================
    // PWA - INSTALLATION
    // ============================================================
    let deferredPrompt = null;
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) {
            console.log('✅ Service Worker registered:', reg.scope);
          })
          .catch(function(err) {
            console.log('❌ Service Worker registration failed:', err);
          });
      });
    }
    
    // Install button visibility
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'inline-block';
      console.log('📲 Install prompt available');
    });
    
    window.addEventListener('appinstalled', function() {
      document.getElementById('installBtn').style.display = 'none';
      console.log('✅ App installed successfully');
      showToast('✅ Aplikasi berhasil diinstal!', 'success');
    });
    
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(choiceResult) {
          if (choiceResult.outcome === 'accepted') {
            console.log('✅ User accepted the install prompt');
            document.getElementById('installBtn').style.display = 'none';
          } else {
            console.log('❌ User dismissed the install prompt');
          }
          deferredPrompt = null;
        });
      } else {
        // Fallback untuk iOS / browser lain
        if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) {
          document.getElementById('iosPrompt').style.display = 'block';
        } else {
          showToast('💡 Gunakan Chrome atau Edge untuk instalasi', 'info');
        }
      }
    }
    
    // ============================================================
    // HIDE SPLASH & LOAD APP
    // ============================================================
    window.addEventListener('load', function() {
      // Show main app after splash
      setTimeout(function() {
        document.getElementById('splashScreen').classList.add('hidden');
        const mainApp = document.getElementById('mainApp');
        mainApp.style.display = 'block';
        setTimeout(function() {
          mainApp.classList.add('visible');
        }, 100);
        
        // Load real app content
        loadAppContent();
      }, 3000);
    });
    
    function loadAppContent() {
      // Simulate loading real app
      const content = document.querySelector('.content');
      content.innerHTML = `
        <div style="text-align:center;padding:40px 20px;">
          <i class="fas fa-check-circle" style="font-size:48px;color:var(--success);margin-bottom:20px;"></i>
          <h2 style="color:var(--navy);">Aplikasi Siap Digunakan</h2>
          <p style="color:var(--gray-600);margin:10px 0 20px;">
            <i class="fas fa-arrow-right"></i> Buka <strong>https://script.google.com/macros/s/AKfycbw8Ltc68JaLuUSNzJz6L5weD1_QjH8ybd5_DQCn1zW6DDf7MoUQuKpL6qsEBHn0rL4lZQ/exec</strong>
          </p>
          <button onclick="window.open('https://script.google.com/macros/s/AKfycbw8Ltc68JaLuUSNzJz6L5weD1_QjH8ybd5_DQCn1zW6DDf7MoUQuKpL6qsEBHn0rL4lZQ/exec', '_blank')" 
                  style="padding:14px 30px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">
            <i class="fas fa-external-link-alt"></i> Buka Aplikasi
          </button>
          <div style="margin-top:30px;padding:20px;background:var(--gray-50);border-radius:8px;max-width:500px;margin-left:auto;margin-right:auto;">
            <p style="font-size:13px;color:var(--gray-600);">
              <i class="fas fa-info-circle" style="color:var(--gold);"></i> 
              Aplikasi ini adalah wrapper PWA untuk SIAP JALAN. 
              <br>Klik tombol di atas untuk membuka aplikasi utama.
            </p>
          </div>
        </div>
      `;
      
      // Update user info
      document.getElementById('userDisplay').innerHTML = `
        <span style="font-weight:600;">👤 Guest</span>
        <span style="background:var(--gold);color:var(--navy);padding:2px 12px;border-radius:12px;font-size:11px;font-weight:700;">viewer</span>
      `;
    }
    
    // ============================================================
    // TOAST
    // ============================================================
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 28px;
        border-radius: 12px;
        color: white;
        font-weight: 600;
        z-index: 9999;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        animation: slideUp 0.5s ease;
        max-width: 90%;
        background: ${type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : type === 'warning' ? '#ffc107' : '#17a2b8'};
        color: ${type === 'warning' ? '#333' : 'white'};
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.5s';
        setTimeout(function() { toast.remove(); }, 500);
      }, 4000);
    }
    
    // ============================================================
    // LOGOUT
    // ============================================================
    function logout() {
      if (confirm('Yakin ingin logout?')) {
        showToast('👋 Logout berhasil', 'info');
        // Redirect to login or reload
        window.location.reload();
      }
    }
    
    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal').forEach(function(m) {
          m.style.display = 'none';
        });
      }
    });
    
    console.log('🚀 SIAP JALAN PWA v2.0 loaded!');
    console.log('📱 Install app with Chrome/Edge or add to home screen');
  </script>
</body>
</html>
